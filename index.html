<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Quiz Game</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="container">
			<section class="screenactive" id="startscreen">
				<h1>Quiz Time!</h1>
				<p>Test your knowledge with these fun questions</p>
				<button id="startbtn">Start Quiz</button>
			</section>
			<section class="screen" id="quiz-screen">
				<div class="quiz-header">
					<h2 id="question-text">Question goes here</h2>
					<div class="quiz-info">
						<p>
							Question <span id="current-question">1</span> of
							<span id="total-questions">5</span>
						</p>

						<p>Score: <span id="score">0</span></p>
					</div>
				</div>
				<div id="answers-container" class="answers-container">
					<!-- Insert answer buttons HERE -->
				</div>
				<div class="progress-bar">
					<div id="progress" class="progress"></div>
				</div>
			</section>
			<section id="result-screen" class="screen">
				<h1>Quiz Results</h1>
				<div class="result-info">
					<p>
						You scored <span id="final-score">0</span> out of
						<span id="max-score">5</span>
					</p>

					<div id="result-message">Good job!</div>
				</div>
				<button id="restart-btn">Restart Quiz</button>
			</section>
		</main>

		<script src="app.js"></script>
	</body>
</html>
